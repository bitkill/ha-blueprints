blueprint:
  name: BILRESA Scroll Wheel — Three-Light Dimmer
  description: >
    Dim three lights with an IKEA BILRESA scroll wheel (Matter).
    The wheel's built-in dot selector (three dots) picks which of the
    three lights the rotation will dim. Rotating CW brightens the
    currently-selected light; CCW dims it.
  domain: automation
  input:
    light_dot1:
      name: Light for Dot 1
      selector:
        entity:
          domain: light
    light_dot2:
      name: Light for Dot 2
      selector:
        entity:
          domain: light
    light_dot3:
      name: Light for Dot 3
      selector:
        entity:
          domain: light
    dim_step:
      name: Brightness per tick (%)
      description: How much each rotation tick changes brightness.
      default: 10
      selector:
        number:
          min: 1
          max: 25
          unit_of_measurement: "%"
    cw_event:
      name: Clockwise rotation event entity
      default: event.bilresa_scroll_wheel_button_1
      selector:
        entity:
          domain: event
    ccw_event:
      name: Counter-clockwise rotation event entity
      default: event.bilresa_scroll_wheel_button_2
      selector:
        entity:
          domain: event
    dot1_event:
      name: Dot 1 selector event entity
      default: event.bilresa_scroll_wheel_button_7
      selector:
        entity:
          domain: event
    dot2_event:
      name: Dot 2 selector event entity
      default: event.bilresa_scroll_wheel_button_8
      selector:
        entity:
          domain: event
    dot3_event:
      name: Dot 3 selector event entity
      default: event.bilresa_scroll_wheel_button_9
      selector:
        entity:
          domain: event

mode: queued
max: 10
max_exceeded: silent

trigger:
  - platform: state
    entity_id: !input cw_event
    id: cw
  - platform: state
    entity_id: !input ccw_event
    id: ccw

variables:
  light_dot1: !input light_dot1
  light_dot2: !input light_dot2
  light_dot3: !input light_dot3
  dim_step: !input dim_step
  dot1_event: !input dot1_event
  dot2_event: !input dot2_event
  dot3_event: !input dot3_event
  active_light: >-
    {% set t1 = states(dot1_event) %}
    {% set t2 = states(dot2_event) %}
    {% set t3 = states(dot3_event) %}
    {% set candidates = [
      (t1 if t1 not in ['unknown','unavailable'] else '', light_dot1),
      (t2 if t2 not in ['unknown','unavailable'] else '', light_dot2),
      (t3 if t3 not in ['unknown','unavailable'] else '', light_dot3)
    ] %}
    {% set best = candidates | max(attribute=0) %}
    {{ best[1] if best[0] else light_dot1 }}
  ticks: "{{ trigger.to_state.attributes.event_type.split('_')[-1] | int(1) }}"
  delta: "{{ ticks * dim_step * (1 if trigger.id == 'cw' else -1) }}"

action:
  - service: light.turn_on
    target:
      entity_id: "{{ active_light }}"
    data:
      brightness_step_pct: "{{ delta }}"
