blueprint:
  name: BILRESA Scroll Wheel — Three-Light Dimmer
  description: >
    Control three lights with an IKEA BILRESA scroll wheel (Matter).
    The wheel's physical dot selector picks which light a gesture
    affects.

      Rotation CW / CCW  → dim the selected light
        Dot 1 → button 1 / button 2
        Dot 2 → button 4 / button 5
        Dot 3 → button 7 / button 8
      Short press          → toggle on/off
        Dot 1 → button 3
        Dot 2 → button 6
        Dot 3 → button 9
      Long press           → apply per-dot scene (color + brightness)

    Entities are resolved from the selected device at runtime, so one
    blueprint works for any BILRESA you add.
  domain: automation
  input:
    remote:
      name: BILRESA scroll wheel
      description: Which BILRESA remote drives this automation.
      selector:
        device:
          filter:
            integration: matter
            manufacturer: IKEA of Sweden
            model: BILRESA scroll wheel
    light_dot1:
      name: Light for Dot 1
      selector:
        entity:
          domain: light
    light_dot2:
      name: Light for Dot 2
      selector:
        entity:
          domain: light
    light_dot3:
      name: Light for Dot 3
      selector:
        entity:
          domain: light
    dim_step:
      name: Brightness per tick (%)
      description: >
        How much each rotation tick changes brightness. Keep this low —
        fast rotations are reported as multi-tick bursts (e.g.
        multi_press_7), and the total change per event is capped at
        ±50% regardless of this setting.
      default: 5
      selector:
        number:
          min: 1
          max: 15
          unit_of_measurement: "%"
    long_press_scene:
      name: Long-press scene
      description: >
        When a dot button is long-pressed, the matching light is set to
        this color and brightness. Color is ignored by lights that
        only support on/off or brightness.
      icon: mdi:palette
      collapsed: true
      input:
        brightness_dot1:
          name: Dot 1 — long-press brightness (%)
          default: 80
          selector:
            number:
              min: 1
              max: 100
              unit_of_measurement: "%"
        color_dot1:
          name: Dot 1 — long-press color
          default: [255, 217, 168]
          selector:
            color_rgb:
        brightness_dot2:
          name: Dot 2 — long-press brightness (%)
          default: 80
          selector:
            number:
              min: 1
              max: 100
              unit_of_measurement: "%"
        color_dot2:
          name: Dot 2 — long-press color
          default: [255, 217, 168]
          selector:
            color_rgb:
        brightness_dot3:
          name: Dot 3 — long-press brightness (%)
          default: 80
          selector:
            number:
              min: 1
              max: 100
              unit_of_measurement: "%"
        color_dot3:
          name: Dot 3 — long-press color
          default: [255, 217, 168]
          selector:
            color_rgb:

mode: queued
max: 10
max_exceeded: silent

variables:
  remote: !input remote
  light_dot1: !input light_dot1
  light_dot2: !input light_dot2
  light_dot3: !input light_dot3
  dim_step: !input dim_step
  brightness_dot1: !input brightness_dot1
  brightness_dot2: !input brightness_dot2
  brightness_dot3: !input brightness_dot3
  color_dot1: !input color_dot1
  color_dot2: !input color_dot2
  color_dot3: !input color_dot3

trigger:
  - platform: event
    event_type: state_changed

condition:
  - "{{ trigger.event.data.new_state is not none }}"
  - "{{ trigger.event.data.entity_id.startswith('event.') }}"
  - "{{ device_id(trigger.event.data.entity_id) == remote }}"
  - "{{ trigger.event.data.new_state.attributes.event_type is not none }}"

action:
  - variables:
      event_type: "{{ trigger.event.data.new_state.attributes.event_type }}"
      button_num: >-
        {{ (trigger.event.data.new_state.attributes.friendly_name
            | regex_findall('\((\d+)\)') | first | default('0')) | int }}
      dot: "{{ ((button_num - 1) // 3) + 1 }}"
      slot: "{{ ((button_num - 1) % 3) + 1 }}"
      target_light: >-
        {% if dot == 1 %}{{ light_dot1 }}
        {% elif dot == 2 %}{{ light_dot2 }}
        {% else %}{{ light_dot3 }}{% endif %}
  - choose:
      # Rotation: slot 1 = CW, slot 2 = CCW
      - conditions:
          - "{{ slot in [1, 2] }}"
        sequence:
          - variables:
              sign: "{{ 1 if slot == 1 else -1 }}"
              ticks: "{{ event_type.split('_')[-1] | int(1) }}"
              raw_delta: "{{ ticks * dim_step * sign }}"
              delta: "{{ [-50, [50, raw_delta] | min] | max }}"
          - service: light.turn_on
            target:
              entity_id: "{{ target_light }}"
            data:
              brightness_step_pct: "{{ delta }}"
      # Short press on dot button (slot 3): toggle. Ignore double/triple.
      - conditions:
          - "{{ slot == 3 }}"
          - "{{ event_type == 'multi_press_1' }}"
        sequence:
          - service: light.toggle
            target:
              entity_id: "{{ target_light }}"
      # Long press on dot button (slot 3): apply per-dot scene.
      - conditions:
          - "{{ slot == 3 }}"
          - "{{ event_type == 'long_press' }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: "{{ target_light }}"
            data:
              brightness_pct: >-
                {% if dot == 1 %}{{ brightness_dot1 }}
                {% elif dot == 2 %}{{ brightness_dot2 }}
                {% else %}{{ brightness_dot3 }}{% endif %}
              rgb_color: >-
                {% if dot == 1 %}{{ color_dot1 }}
                {% elif dot == 2 %}{{ color_dot2 }}
                {% else %}{{ color_dot3 }}{% endif %}
