blueprint:
  name: BILRESA Scroll Wheel — Three-Light Dimmer
  description: >
    Dim three lights with an IKEA BILRESA scroll wheel (Matter).
    The wheel's physical dot selector picks which of three lights
    the rotation dims. Short-press on a dot button toggles that
    dot's light on/off.

      Rotation CW / CCW
        Dot 1 → button_1 / button_2
        Dot 2 → button_4 / button_5
        Dot 3 → button_7 / button_8
      Short press (toggle)
        Dot 1 → button_3
        Dot 2 → button_6
        Dot 3 → button_9

    Entities are hardcoded. If you have more than one BILRESA
    scroll wheel in HA, duplicate this blueprint and adjust.
  domain: automation
  input:
    light_dot1:
      name: Light for Dot 1
      selector:
        entity:
          domain: light
    light_dot2:
      name: Light for Dot 2
      selector:
        entity:
          domain: light
    light_dot3:
      name: Light for Dot 3
      selector:
        entity:
          domain: light
    dim_step:
      name: Brightness per tick (%)
      description: How much each rotation tick changes brightness.
      default: 10
      selector:
        number:
          min: 1
          max: 25
          unit_of_measurement: "%"

mode: queued
max: 10
max_exceeded: silent

variables:
  light_dot1: !input light_dot1
  light_dot2: !input light_dot2
  light_dot3: !input light_dot3
  dim_step: !input dim_step

trigger:
  # Rotation — per-dot CW and CCW
  - platform: state
    entity_id: event.bilresa_scroll_wheel_button_1
    id: dot1_cw
  - platform: state
    entity_id: event.bilresa_scroll_wheel_button_2
    id: dot1_ccw
  - platform: state
    entity_id: event.bilresa_scroll_wheel_button_4
    id: dot2_cw
  - platform: state
    entity_id: event.bilresa_scroll_wheel_button_5
    id: dot2_ccw
  - platform: state
    entity_id: event.bilresa_scroll_wheel_button_7
    id: dot3_cw
  - platform: state
    entity_id: event.bilresa_scroll_wheel_button_8
    id: dot3_ccw
  # Short press on dot buttons
  - platform: state
    entity_id: event.bilresa_scroll_wheel_button_3
    id: dot1_press
  - platform: state
    entity_id: event.bilresa_scroll_wheel_button_6
    id: dot2_press
  - platform: state
    entity_id: event.bilresa_scroll_wheel_button_9
    id: dot3_press

action:
  - variables:
      dot: "{{ trigger.id.split('_')[0] }}"
      target_light: >-
        {% if dot == 'dot1' %}{{ light_dot1 }}
        {% elif dot == 'dot2' %}{{ light_dot2 }}
        {% else %}{{ light_dot3 }}{% endif %}
  - choose:
      # Rotation: dim the target light
      - conditions:
          - "{{ trigger.id.endswith('_cw') or trigger.id.endswith('_ccw') }}"
        sequence:
          - variables:
              sign: "{{ 1 if trigger.id.endswith('_cw') else -1 }}"
              ticks: "{{ trigger.to_state.attributes.event_type.split('_')[-1] | int(1) }}"
              delta: "{{ ticks * dim_step * sign }}"
          - service: light.turn_on
            target:
              entity_id: "{{ target_light }}"
            data:
              brightness_step_pct: "{{ delta }}"
      # Short press: toggle the target light (ignore double/triple/long)
      - conditions:
          - "{{ trigger.id.endswith('_press') }}"
          - "{{ trigger.to_state.attributes.event_type == 'multi_press_1' }}"
        sequence:
          - service: light.toggle
            target:
              entity_id: "{{ target_light }}"
