<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>BILRESA Live Debug</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 24px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    background: #0d1117; color: #e6edf3;
    min-height: 100vh;
  }
  h1 { margin: 0 0 4px; font-size: 20px; font-weight: 600; }
  .status { font-size: 12px; color: #8b949e; margin-bottom: 24px; }
  .status.ok { color: #3fb950; }
  .status.err { color: #f85149; }

  .stack {
    display: flex;
    flex-direction: column;
    gap: 24px;
    max-width: 1200px;
  }

  .panel {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 20px;
  }
  .panel > h2 {
    margin: 0 0 16px;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #8b949e;
  }

  .remote-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 20px;
  }
  .remote-header h2 {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
    color: #e6edf3;
    text-transform: none;
    letter-spacing: 0;
  }
  .remote-header .device-id {
    font-size: 11px;
    color: #6e7681;
  }
  .remote-header .subtitle {
    font-size: 11px;
    color: #8b949e;
  }

  .remote-body {
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 24px;
    align-items: start;
  }
  @media (max-width: 900px) {
    .remote-body { grid-template-columns: 1fr; }
  }

  .dots {
    display: flex;
    justify-content: center;
    gap: 28px;
    padding: 24px 0;
  }
  .dot {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 2px solid #30363d;
    background: #0d1117;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 600;
    color: #484f58;
    transition: all 0.25s ease;
    position: relative;
  }
  .dot.active {
    background: #1f6feb;
    border-color: #58a6ff;
    color: #fff;
    box-shadow: 0 0 24px rgba(88, 166, 255, 0.5);
  }
  .dot.flash {
    transform: scale(1.15);
    background: #fb8500;
    border-color: #fb8500;
    color: #fff;
  }
  .dot .label {
    position: absolute; bottom: -22px; left: 0; right: 0;
    text-align: center; font-size: 10px; color: #8b949e;
    font-weight: 400; letter-spacing: 0.05em;
  }

  .rotation {
    display: flex; align-items: center; justify-content: center;
    height: 120px;
    position: relative;
  }
  .wheel {
    width: 96px; height: 96px;
    border: 3px solid #30363d;
    border-radius: 50%;
    position: relative;
    transition: transform 0.2s ease, border-color 0.2s ease;
  }
  .wheel::before {
    content: '';
    position: absolute; top: 4px; left: 50%;
    width: 6px; height: 16px; margin-left: -3px;
    background: #58a6ff;
    border-radius: 3px;
  }
  .wheel.cw {
    border-color: #3fb950;
    box-shadow: 0 0 24px rgba(63, 185, 80, 0.5);
  }
  .wheel.ccw {
    border-color: #f85149;
    box-shadow: 0 0 24px rgba(248, 81, 73, 0.5);
  }
  .rotation-info {
    position: absolute;
    top: 8px; right: 8px;
    font-size: 11px;
    color: #8b949e;
    text-align: right;
  }
  .rotation-info .dir { font-weight: 600; font-size: 14px; }
  .dir.cw { color: #3fb950; }
  .dir.ccw { color: #f85149; }

  .buttons {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .btn-box {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 10px;
    font-size: 11px;
    transition: all 0.15s ease;
  }
  .btn-box.hit {
    border-color: #fb8500;
    background: #2d1a0a;
  }
  .btn-box .name { font-weight: 600; color: #e6edf3; }
  .btn-box .role { color: #6e7681; font-size: 10px; margin-top: 1px; }
  .btn-box .et { color: #8b949e; margin-top: 3px; font-size: 10px; }
  .btn-box .ts { color: #6e7681; font-size: 9px; margin-top: 2px; }

  .log {
    max-height: 400px;
    overflow-y: auto;
    font-size: 11px;
  }
  .log-entry {
    padding: 6px 0;
    border-bottom: 1px solid #21262d;
    display: grid;
    grid-template-columns: 70px 110px 1fr;
    gap: 12px;
  }
  .log-entry .t { color: #6e7681; }
  .log-entry .r { color: #8b949e; font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .log-entry .m { color: #e6edf3; }
  .log-entry.rot .m { color: #58a6ff; }
  .log-entry.press .m { color: #fb8500; }
  .log-entry.sens .m { color: #6e7681; font-size: 10px; }

  .empty {
    text-align: center;
    padding: 32px;
    color: #8b949e;
    font-size: 13px;
  }

  .targets {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid #21262d;
  }
  .targets h3 {
    margin: 0 0 12px;
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: #8b949e;
  }
  .target-row {
    display: grid;
    grid-template-columns: 48px 1fr auto;
    gap: 10px;
    padding: 6px 0;
    font-size: 12px;
    align-items: baseline;
  }
  .target-row .dot-lbl {
    font-weight: 600; color: #58a6ff;
  }
  .target-row .eid {
    color: #e6edf3;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .target-row .eid.empty { color: #484f58; font-style: italic; }
  .target-row .state-info {
    color: #8b949e;
    font-size: 11px;
  }
  .target-row .state-info.unavailable { color: #f85149; }
  .target-row .state-info.on { color: #3fb950; }
  .target-row.flash {
    background: #1f2937;
    border-radius: 4px;
    animation: flash-fade 1.2s ease-out;
  }
  @keyframes flash-fade {
    0%   { background: #3b2f0a; }
    100% { background: transparent; }
  }

  .auth-panel {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 20px;
    max-width: 640px;
    margin-bottom: 24px;
  }
  .auth-panel h2 {
    margin: 0 0 8px;
    font-size: 13px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: #8b949e;
  }
  .auth-panel p { margin: 0 0 12px; font-size: 12px; color: #8b949e; }
  .auth-panel input[type=password],
  .auth-panel input[type=text] {
    width: 100%;
    padding: 8px 10px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #e6edf3;
    font-family: inherit;
    font-size: 12px;
    margin-bottom: 10px;
  }
  .auth-panel input[type=password]:focus,
  .auth-panel input[type=text]:focus {
    outline: none;
    border-color: #58a6ff;
  }
  .auth-panel .field-label {
    display: block;
    font-size: 11px;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }
  .auth-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .auth-panel label {
    font-size: 12px; color: #8b949e;
    display: flex; align-items: center; gap: 6px;
    cursor: pointer;
  }
  .auth-panel button {
    background: #238636;
    border: 1px solid #2ea043;
    color: #fff;
    padding: 8px 16px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 12px; font-weight: 600;
    cursor: pointer;
  }
  .auth-panel button:hover { background: #2ea043; }
  .auth-inline {
    font-size: 11px; color: #8b949e;
    margin-left: 8px;
  }
  .auth-inline a { color: #58a6ff; cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>
  <h1>BILRESA Scroll Wheel — Live Debug</h1>
  <div id="status" class="status">waiting for token…<span class="auth-inline" id="forget-wrap" hidden> · <a id="forget">clear saved token</a></span></div>

  <div class="auth-panel" id="auth-panel">
    <h2>Home Assistant Connection</h2>
    <p>Enter your HA WebSocket URL and a long-lived access token. Both are used locally by this page only — nothing is sent elsewhere.</p>
    <span class="field-label">WebSocket URL</span>
    <input type="text" id="url-input" autocomplete="off" spellcheck="false">
    <span class="field-label">Access token</span>
    <input type="password" id="token-input" placeholder="eyJhbGciOi…" autocomplete="off" spellcheck="false">
    <div class="auth-row">
      <label><input type="checkbox" id="remember" checked> Remember in this browser (localStorage)</label>
      <button id="connect-btn">Connect</button>
    </div>
  </div>

  <div class="stack" id="main" hidden>
    <div id="remotes-container"></div>
    <div class="panel">
      <h2>Event Log</h2>
      <div class="log" id="log"></div>
    </div>
  </div>

<script>
const DEFAULT_HA_WS_URL = "ws://10.0.0.50:8123/api/websocket";
const TOKEN_STORAGE_KEY = "bilresa_debug_ha_token";
const URL_STORAGE_KEY   = "bilresa_debug_ha_ws_url";

const authPanel    = document.getElementById("auth-panel");
const mainEl       = document.getElementById("main");
const remotesEl    = document.getElementById("remotes-container");
const urlInput     = document.getElementById("url-input");
const tokenInput   = document.getElementById("token-input");
const rememberCb   = document.getElementById("remember");
const connectBtn   = document.getElementById("connect-btn");
const forgetWrap   = document.getElementById("forget-wrap");
const forgetLink   = document.getElementById("forget");
const statusEl     = document.getElementById("status");
const logEl        = document.getElementById("log");

urlInput.placeholder = DEFAULT_HA_WS_URL;

// button endpoint role: 1/4/7 = CW rotation, 2/5/8 = CCW rotation, 3/6/9 = dot press
const ROLE = {
  1: { dot: 1, kind: "rotation", dir: "CW",  label: "Dot 1 · CW"  },
  2: { dot: 1, kind: "rotation", dir: "CCW", label: "Dot 1 · CCW" },
  3: { dot: 1, kind: "press",                 label: "Dot 1 · Press"},
  4: { dot: 2, kind: "rotation", dir: "CW",  label: "Dot 2 · CW"  },
  5: { dot: 2, kind: "rotation", dir: "CCW", label: "Dot 2 · CCW" },
  6: { dot: 2, kind: "press",                 label: "Dot 2 · Press"},
  7: { dot: 3, kind: "rotation", dir: "CW",  label: "Dot 3 · CW"  },
  8: { dot: 3, kind: "rotation", dir: "CCW", label: "Dot 3 · CCW" },
  9: { dot: 3, kind: "press",                 label: "Dot 3 · Press"},
};

const remotes = new Map();          // device_id → RemoteState
const entityToDevice = new Map();   // entity_id → device_id
const entityToButton = new Map();   // entity_id → button number (1..9)

function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = "status " + (cls || "");
}

function addLog(kind, remoteLabel, msg) {
  const entry = document.createElement("div");
  entry.className = `log-entry ${kind}`;
  const now = new Date();
  const t = now.toLocaleTimeString([], {hour12: false}) + "." + String(now.getMilliseconds()).padStart(3,'0');
  entry.innerHTML = `<span class="t">${t}</span><span class="r">${remoteLabel || ""}</span><span class="m">${msg}</span>`;
  logEl.insertBefore(entry, logEl.firstChild);
  while (logEl.children.length > 200) logEl.removeChild(logEl.lastChild);
}

function buildRemotePanel(device, entities) {
  // entities: { 1: "event.xxx_button_1", ..., 9: "event.xxx_button_9" }
  const name = device.name_by_user || device.name || "BILRESA scroll wheel";
  const section = document.createElement("section");
  section.className = "panel";
  section.dataset.deviceId = device.id;

  const subtitle = Object.values(entities)[0]?.replace(/_button_\d+(_\d+)?$/, "") || "";

  section.innerHTML = `
    <header class="remote-header">
      <h2>${name}</h2>
      <span class="subtitle">${subtitle}</span>
      <span class="device-id">${device.id.slice(0, 12)}…</span>
    </header>
    <div class="remote-body">
      <div>
        <div class="dots">
          <div class="dot" data-dot="1">1<div class="label">btn 1/2/3</div></div>
          <div class="dot" data-dot="2">2<div class="label">btn 4/5/6</div></div>
          <div class="dot" data-dot="3">3<div class="label">btn 7/8/9</div></div>
        </div>
        <div class="rotation" style="margin-top:32px">
          <div class="wheel"></div>
          <div class="rotation-info">
            <div class="dir">—</div>
            <div class="ticks">0 ticks</div>
          </div>
        </div>
      </div>
      <div>
        <div class="buttons"></div>
      </div>
    </div>
    <div class="targets">
      <h3>Detected Target Lights <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#6e7681;">(auto-attributed from state changes within 750ms of a BILRESA event)</span></h3>
      <div class="target-list">
        <div class="target-row" data-dot="1"><span class="dot-lbl">Dot 1</span><span class="eid empty">(not yet detected)</span><span class="state-info"></span></div>
        <div class="target-row" data-dot="2"><span class="dot-lbl">Dot 2</span><span class="eid empty">(not yet detected)</span><span class="state-info"></span></div>
        <div class="target-row" data-dot="3"><span class="dot-lbl">Dot 3</span><span class="eid empty">(not yet detected)</span><span class="state-info"></span></div>
      </div>
    </div>
  `;
  remotesEl.appendChild(section);

  const buttonsEl = section.querySelector(".buttons");
  const btnEls = {};
  for (let i = 1; i <= 9; i++) {
    const role = ROLE[i];
    const box = document.createElement("div");
    box.className = "btn-box";
    box.innerHTML = `
      <div class="name">button_${i}</div>
      <div class="role">${role.label}</div>
      <div class="et">—</div>
      <div class="ts">—</div>
    `;
    buttonsEl.appendChild(box);
    btnEls[i] = box;
  }

  return {
    id: device.id,
    name,
    entities,               // 1..9 → entity_id
    btnStates: Object.fromEntries(
      Array.from({length: 9}, (_, i) => [i+1, { et: "—", ts: "—", hitAt: 0 }])
    ),
    detected: { 1: null, 2: null, 3: null }, // dot → { entity_id }
    wheelRot: 0,
    els: {
      section,
      dots: Array.from(section.querySelectorAll(".dot")),
      btnEls,
      wheel: section.querySelector(".wheel"),
      dir: section.querySelector(".rotation-info .dir"),
      ticks: section.querySelector(".rotation-info .ticks"),
      targetRows: {
        1: section.querySelector('.target-row[data-dot="1"]'),
        2: section.querySelector('.target-row[data-dot="2"]'),
        3: section.querySelector('.target-row[data-dot="3"]'),
      },
    },
  };
}

// Most recent trigger across all remotes — used to attribute light state
// changes to whichever remote/dot just fired.
let lastTrigger = null;
const ATTR_WINDOW_MS = 750;

function renderDetectedTarget(remote, dot, eid, oldState, newState) {
  const row = remote.els.targetRows[dot];
  if (!row) return;
  const eidEl   = row.querySelector(".eid");
  const stateEl = row.querySelector(".state-info");

  // Update the stored entity_id for this dot (keep the latest detection)
  if (!remote.detected[dot] || remote.detected[dot].entity_id !== eid) {
    remote.detected[dot] = { entity_id: eid };
  }

  eidEl.textContent = eid;
  eidEl.classList.remove("empty");

  const nbr = (newState.attributes || {}).brightness;
  const obr = (oldState && oldState.attributes) ? oldState.attributes.brightness : null;
  const pct = nbr != null ? Math.round((nbr / 255) * 100) : null;
  let info;
  if (newState.state === "unavailable") info = "unavailable";
  else if (newState.state === "on") info = pct != null ? `on · ${pct}%` : "on";
  else info = newState.state;
  if (obr != null && nbr != null && obr !== nbr) {
    info += `  (br ${obr}→${nbr})`;
  } else if ((oldState && oldState.state) && oldState.state !== newState.state) {
    info += `  (${oldState.state}→${newState.state})`;
  }
  stateEl.textContent = info;
  stateEl.className = "state-info " + (newState.state === "unavailable" ? "unavailable" : newState.state === "on" ? "on" : "");

  row.classList.remove("flash");
  void row.offsetWidth;
  row.classList.add("flash");
}

function refreshActiveDot(remote) {
  let best = null;
  for (let n = 1; n <= 9; n++) {
    if (ROLE[n].kind !== "rotation") continue;
    const ts = remote.btnStates[n].hitAt;
    if (ts > 0 && (!best || ts > best.ts)) best = { dot: ROLE[n].dot, ts };
  }
  remote.els.dots.forEach(d => d.classList.remove("active"));
  if (best) remote.els.dots[best.dot - 1].classList.add("active");
}

function flashDot(remote, dot) {
  const el = remote.els.dots[dot - 1];
  el.classList.add("flash");
  setTimeout(() => el.classList.remove("flash"), 300);
}

function handleButtonEvent(remote, n, et) {
  const now = Date.now();
  remote.btnStates[n].et = et;
  remote.btnStates[n].ts = new Date(now).toLocaleTimeString([], {hour12: false});
  remote.btnStates[n].hitAt = now;

  lastTrigger = { remote, dot: ROLE[n].dot, kind: ROLE[n].kind, at: now };

  const box = remote.els.btnEls[n];
  box.querySelector(".et").textContent = et;
  box.querySelector(".ts").textContent = remote.btnStates[n].ts;
  box.classList.add("hit");
  setTimeout(() => box.classList.remove("hit"), 400);

  const role = ROLE[n];
  if (role.kind === "rotation") {
    const ticks = parseInt(et.split("_").pop()) || 1;
    const { wheel, dir: dirEl, ticks: ticksEl } = remote.els;
    wheel.classList.remove("cw", "ccw");
    void wheel.offsetWidth;
    wheel.classList.add(role.dir.toLowerCase());
    remote.wheelRot += (role.dir === "CW" ? 1 : -1) * ticks * 20;
    wheel.style.transform = `rotate(${remote.wheelRot}deg)`;
    dirEl.textContent = `${role.dir} · Dot ${role.dot}`;
    dirEl.className = "dir " + role.dir.toLowerCase();
    ticksEl.textContent = `${ticks} tick${ticks > 1 ? 's' : ''}`;
    flashDot(remote, role.dot);
    refreshActiveDot(remote);
    addLog("rot", remote.name, `Rotate <b>${role.dir}</b> ×${ticks} on <b>Dot ${role.dot}</b> (button_${n} ${et})`);
    setTimeout(() => wheel.classList.remove("cw", "ccw"), 800);
  } else {
    flashDot(remote, role.dot);
    addLog("press", remote.name, `Dot ${role.dot} press (button_${n} ${et})`);
  }
}

function seedInitialStates(states) {
  for (const s of states) {
    if (!s.entity_id.startsWith("event.")) continue;
    const deviceId = entityToDevice.get(s.entity_id);
    if (!deviceId) continue;
    const remote = remotes.get(deviceId);
    if (!remote) continue;
    const n = entityToButton.get(s.entity_id);
    if (!n) continue;
    if (s.state && s.state !== "unknown" && s.state !== "unavailable") {
      const et = s.attributes.event_type || "—";
      remote.btnStates[n] = {
        et,
        ts: new Date(s.state).toLocaleTimeString([], {hour12: false}),
        hitAt: new Date(s.state).getTime(),
      };
      const box = remote.els.btnEls[n];
      box.querySelector(".et").textContent = et;
      box.querySelector(".ts").textContent = remote.btnStates[n].ts;
    }
    refreshActiveDot(remote);
  }
}

// --- WebSocket with id-indexed response handling ---
function connect(url, token) {
  authPanel.hidden = true;
  mainEl.hidden = false;
  forgetWrap.hidden = false;
  setStatus(`connecting to ${url}…`);

  const ws = new WebSocket(url);
  let msgId = 1;
  const pending = new Map(); // id → resolve function

  function rpc(payload) {
    const id = msgId++;
    ws.send(JSON.stringify({ id, ...payload }));
    return new Promise(resolve => pending.set(id, resolve));
  }

  ws.addEventListener("open",  () => setStatus("connected, authenticating…"));
  ws.addEventListener("error", e => setStatus("error: " + (e.message || "websocket error"), "err"));
  ws.addEventListener("close", () => setStatus("disconnected", "err"));

  ws.addEventListener("message", async evt => {
    const msg = JSON.parse(evt.data);

    if (msg.type === "auth_required") {
      ws.send(JSON.stringify({ type: "auth", access_token: token }));
      return;
    }
    if (msg.type === "auth_invalid") {
      setStatus("auth failed: " + msg.message, "err");
      return;
    }
    if (msg.type === "auth_ok") {
      setStatus("authenticated — discovering BILRESA devices…", "ok");
      // Kick off discovery and subscription in parallel
      discoverAndSubscribe();
      return;
    }
    if (msg.type === "result" && pending.has(msg.id)) {
      pending.get(msg.id)(msg.result);
      pending.delete(msg.id);
      return;
    }
    if (msg.type === "event" && msg.event && msg.event.event_type === "state_changed") {
      handleStateChanged(msg.event.data);
    }
  });

  async function discoverAndSubscribe() {
    const [devices, entities] = await Promise.all([
      rpc({ type: "config/device_registry/list" }),
      rpc({ type: "config/entity_registry/list" }),
    ]);

    const bilresaDevices = devices.filter(d =>
      (d.manufacturer || "").includes("IKEA") &&
      (d.model || "").toLowerCase().includes("bilresa")
    );

    if (bilresaDevices.length === 0) {
      remotesEl.innerHTML = `<div class="panel empty">No BILRESA scroll wheel devices found in this Home Assistant instance.</div>`;
      setStatus("connected — no BILRESA devices", "ok");
      return;
    }

    // For each BILRESA, find its 9 event entities by device_id
    for (const dev of bilresaDevices) {
      const devEntities = entities.filter(e => e.device_id === dev.id && e.entity_id.startsWith("event."));
      const byNum = {};
      for (const e of devEntities) {
        // Button number from original_name like "Button (N)" is most reliable
        const m = (e.original_name || e.entity_id).match(/\((\d+)\)|_button_(\d+)(?:_\d+)?$/);
        const num = m ? parseInt(m[1] || m[2]) : null;
        if (num && num >= 1 && num <= 9) {
          byNum[num] = e.entity_id;
          entityToDevice.set(e.entity_id, dev.id);
          entityToButton.set(e.entity_id, num);
        }
      }
      if (Object.keys(byNum).length === 9) {
        const remote = buildRemotePanel(dev, byNum);
        remotes.set(dev.id, remote);
      } else {
        addLog("", dev.name || dev.id, `skipped — only ${Object.keys(byNum).length} / 9 event entities found`);
      }
    }

    setStatus(`connected — watching ${remotes.size} remote${remotes.size === 1 ? "" : "s"}`, "ok");

    // Subscribe to state_changed and seed initial states
    rpc({ type: "subscribe_events", event_type: "state_changed" });
    const states = await rpc({ type: "get_states" });
    seedInitialStates(states);
    addLog("", "", `discovered ${bilresaDevices.length} BILRESA device${bilresaDevices.length === 1 ? "" : "s"}, seeded ${states.length} states`);
  }

  function handleStateChanged(d) {
    const eid = d.entity_id;
    const ns = d.new_state;
    if (!ns) return;

    // Light state change — maybe correlate with a recent BILRESA trigger
    if (eid.startsWith("light.")) {
      if (lastTrigger && Date.now() - lastTrigger.at <= ATTR_WINDOW_MS) {
        renderDetectedTarget(lastTrigger.remote, lastTrigger.dot, eid, d.old_state, ns);
        addLog("", lastTrigger.remote.name, `⟶ <b>${eid}</b> changed (dot ${lastTrigger.dot})`);
      }
      return;
    }

    // BILRESA event entity?
    const deviceId = entityToDevice.get(eid);
    if (!deviceId) return;
    const remote = remotes.get(deviceId);
    if (!remote) return;
    const n = entityToButton.get(eid);
    if (!n) return;
    const et = ns.attributes.event_type;
    if (!et) return;
    handleButtonEvent(remote, n, et);
  }
}

// --- Credential bootstrap ---
function lsGet(k)    { try { return localStorage.getItem(k); } catch { return null; } }
function lsSet(k, v) { try { localStorage.setItem(k, v); } catch {} }
function lsRemove(k) { try { localStorage.removeItem(k); } catch {} }

connectBtn.addEventListener("click", () => {
  const url = urlInput.value.trim() || DEFAULT_HA_WS_URL;
  const token = tokenInput.value.trim();
  if (!token) { tokenInput.focus(); return; }
  if (rememberCb.checked) {
    lsSet(TOKEN_STORAGE_KEY, token);
    lsSet(URL_STORAGE_KEY, url);
  }
  connect(url, token);
});

[urlInput, tokenInput].forEach(el => {
  el.addEventListener("keydown", e => { if (e.key === "Enter") connectBtn.click(); });
});

forgetLink.addEventListener("click", () => {
  lsRemove(TOKEN_STORAGE_KEY);
  lsRemove(URL_STORAGE_KEY);
  location.reload();
});

const savedToken = lsGet(TOKEN_STORAGE_KEY);
const savedUrl   = lsGet(URL_STORAGE_KEY) || DEFAULT_HA_WS_URL;
urlInput.value = savedUrl;

if (savedToken) {
  connect(savedUrl, savedToken);
} else {
  tokenInput.focus();
}
</script>
</body>
