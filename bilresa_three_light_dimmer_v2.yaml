blueprint:
  name: BILRESA Scroll Wheel — Three-Light Dimmer (low-latency)
  description: >
    Same behavior as the standard blueprint, but triggered from the
    BILRESA's "Current switch position" sensors instead of its event
    entities. Position sensors fire on physical actuation (~20-40 ms)
    while event entities are debounced (~400-1200 ms), so rotation and
    presses feel snappier.

    Enable all nine "Current switch position" sensors on the BILRESA
    device before using this blueprint (Settings → Devices → BILRESA →
    "+N disabled entities"). Allow ~30 s after enabling before the
    sensors start reporting data.

      Rotation (one service call per tick, capped per event)
        Dot 1  CW  → position 1   •  CCW → position 2
        Dot 2  CW  → position 4   •  CCW → position 5
        Dot 3  CW  → position 7   •  CCW → position 8
      Press detection (fires on release of position 3 / 6 / 9)
        held <  long_press_ms  → short press → toggle light
        held >= long_press_ms  → long press  → apply scene
  domain: automation
  input:
    remote:
      name: BILRESA scroll wheel
      description: Which BILRESA remote drives this automation.
      selector:
        device:
          filter:
            integration: matter
            manufacturer: IKEA of Sweden
            model: BILRESA scroll wheel
    light_dot1:
      name: Light for Dot 1
      selector:
        entity:
          domain: light
    light_dot2:
      name: Light for Dot 2
      selector:
        entity:
          domain: light
    light_dot3:
      name: Light for Dot 3
      selector:
        entity:
          domain: light
    dim_step:
      name: Brightness per tick (%)
      description: How much each rotation tick changes brightness.
      default: 5
      selector:
        number:
          min: 1
          max: 20
          unit_of_measurement: "%"
    long_press_ms:
      name: Long-press threshold (ms)
      description: >
        A dot button press released before this many milliseconds
        counts as a short press (toggle). Longer presses apply the
        dot's scene. 500 ms is a natural feel.
      default: 500
      selector:
        number:
          min: 200
          max: 2000
          step: 50
          unit_of_measurement: ms
    transition_seconds:
      name: Transition / fade time (s)
      description: >
        How long each light change takes to fade. ~0.3 s keeps rotation
        smooth without lagging behind ticks. Set to 0 for instant
        changes, higher for softer scene transitions.
      default: 0.3
      selector:
        number:
          min: 0
          max: 3
          step: 0.1
          unit_of_measurement: s
    long_press_scene:
      name: Long-press scene
      description: >
        When a dot button is long-pressed, its light is set to this
        color and brightness. Color is ignored by lights that only
        support brightness or on/off.
      icon: mdi:palette
      collapsed: true
      input:
        brightness_dot1:
          name: Dot 1 — long-press brightness (%)
          default: 80
          selector:
            number: { min: 1, max: 100, unit_of_measurement: "%" }
        color_dot1:
          name: Dot 1 — long-press color
          default: [255, 217, 168]
          selector: { color_rgb: {} }
        brightness_dot2:
          name: Dot 2 — long-press brightness (%)
          default: 80
          selector:
            number: { min: 1, max: 100, unit_of_measurement: "%" }
        color_dot2:
          name: Dot 2 — long-press color
          default: [255, 217, 168]
          selector: { color_rgb: {} }
        brightness_dot3:
          name: Dot 3 — long-press brightness (%)
          default: 80
          selector:
            number: { min: 1, max: 100, unit_of_measurement: "%" }
        color_dot3:
          name: Dot 3 — long-press color
          default: [255, 217, 168]
          selector: { color_rgb: {} }

mode: queued
max: 20
max_exceeded: silent

variables:
  remote: !input remote
  light_dot1: !input light_dot1
  light_dot2: !input light_dot2
  light_dot3: !input light_dot3
  dim_step: !input dim_step
  long_press_ms: !input long_press_ms
  transition_seconds: !input transition_seconds
  brightness_dot1: !input brightness_dot1
  brightness_dot2: !input brightness_dot2
  brightness_dot3: !input brightness_dot3
  color_dot1: !input color_dot1
  color_dot2: !input color_dot2
  color_dot3: !input color_dot3

trigger:
  - platform: event
    event_type: state_changed

condition:
  - "{{ trigger.event.data.new_state is not none }}"
  - "{{ 'current_switch_position' in trigger.event.data.entity_id }}"
  - "{{ device_id(trigger.event.data.entity_id) == remote }}"

action:
  - variables:
      # HA coerces numeric state strings to ints in variables, so work with ints everywhere.
      new_state_v: "{{ trigger.event.data.new_state.state | int(-1) }}"
      old_state_v: >-
        {{ trigger.event.data.old_state.state | int(-1)
           if trigger.event.data.old_state else -1 }}
      position_num: >-
        {{ (trigger.event.data.new_state.attributes.friendly_name
            | regex_findall('\((\d+)\)') | first | default('0')) | int }}
      dot: "{{ ((position_num - 1) // 3) + 1 }}"
      slot: "{{ ((position_num - 1) % 3) + 1 }}"
      target_light: >-
        {% if dot == 1 %}{{ light_dot1 }}
        {% elif dot == 2 %}{{ light_dot2 }}
        {% else %}{{ light_dot3 }}{% endif %}
      held_ms: >-
        {{ ((as_timestamp(trigger.event.data.new_state.last_changed)
            - as_timestamp(trigger.event.data.old_state.last_changed))
           * 1000) | int
           if trigger.event.data.old_state else 0 }}
  - choose:
      # Rotation — one dim step per rising edge (0 → 1) on slot 1 (CW) or slot 2 (CCW).
      - conditions:
          - "{{ slot in [1, 2] }}"
          - "{{ new_state_v == 1 and old_state_v != 1 }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: "{{ target_light }}"
            data:
              brightness_step_pct: "{{ dim_step * (1 if slot == 1 else -1) }}"
              transition: "{{ transition_seconds }}"
      # Short press — slot 3 released before the long-press threshold.
      - conditions:
          - "{{ slot == 3 }}"
          - "{{ old_state_v == 1 and new_state_v == 0 }}"
          - "{{ held_ms < long_press_ms }}"
        sequence:
          - service: light.toggle
            target:
              entity_id: "{{ target_light }}"
            data:
              transition: "{{ transition_seconds }}"
      # Long press — slot 3 released after the long-press threshold.
      - conditions:
          - "{{ slot == 3 }}"
          - "{{ old_state_v == 1 and new_state_v == 0 }}"
          - "{{ held_ms >= long_press_ms }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: "{{ target_light }}"
            data:
              brightness_pct: >-
                {% if dot == 1 %}{{ brightness_dot1 }}
                {% elif dot == 2 %}{{ brightness_dot2 }}
                {% else %}{{ brightness_dot3 }}{% endif %}
              rgb_color: >-
                {% if dot == 1 %}{{ color_dot1 }}
                {% elif dot == 2 %}{{ color_dot2 }}
                {% else %}{{ color_dot3 }}{% endif %}
              transition: "{{ transition_seconds }}"
